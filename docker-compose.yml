# Claudable, self-hosted behind a reverse proxy on the host network.
# Deployment-specific values (public URL, preview URL template, host gateway,
# secrets) come from .env (never committed) — see .env.example.
services:
  claudable:
    build: .
    container_name: claudable
    network_mode: host
    restart: unless-stopped
    healthcheck:
      # node (not curl — the slim image has no curl); exit 0 while the app serves.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3700/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3700
      - WEB_PORT=3700
      # Per-project preview dev servers (host-bound). Keep this band clear of the
      # generated-site deploy band and small so each preview subdomain's cert
      # stays under Let's Encrypt rate limits.
      - PREVIEW_PORT_START=3710
      - PREVIEW_PORT_END=3739
      - PREVIEW_BIND_HOST=0.0.0.0
      - DATABASE_URL=file:../data/cc.db
      - PROJECTS_DIR=./data/projects
      # Deterministic port band for generated sites.
      - DEPLOY_PORT_BASE=3500
      - DEPLOY_PORT_SPAN=200
      # NEXT_PUBLIC_APP_URL, PREVIEW_URL_TEMPLATE and DEPLOY_HOST_GATEWAY are
      # deployment-specific and supplied via .env.
      #
      # Project-environment isolation: when set, a `static` project that declares
      # a Dockerfile in its .claudable/preview.json runs its backend in a hardened
      # sibling container (via the docker-socket-proxy below) instead of a bare
      # in-container process. Only affects projects that opt in — everything else
      # is unchanged. Empty/unset = disabled.
      - PREVIEW_ISOLATION=${PREVIEW_ISOLATION:-}
      # Egress-locked Docker network isolated backends attach to (create it +
      # its firewall rules on the host; see docs). Empty = default bridge.
      - PREVIEW_SANDBOX_NETWORK=${PREVIEW_SANDBOX_NETWORK:-}
      # Host path that the ./data volume maps to — needed to translate container
      # project paths to host paths for Docker bind mounts (isolated frontends).
      - DATA_HOST_DIR=${DATA_HOST_DIR:-}
      # Phase 2 (control/data split): run agent turns in a hardened isolated
      # container instead of in-process. Default off = in-process path unchanged.
      - AGENT_CONTAINERIZED=${AGENT_CONTAINERIZED:-}
      # Host path of the global skills dir (compose mounts ./global-skills into
      # THIS container). The containerized agent bind-mounts it read-only at its
      # ~/.claude/skills so it has the same Skill catalog. If empty, it's derived
      # as a sibling of DATA_HOST_DIR.
      - GLOBAL_SKILLS_HOST_DIR=${GLOBAL_SKILLS_HOST_DIR:-}
      - DOCKER_HOST=tcp://127.0.0.1:2375
      - DOCKER_BUILDKIT=0
    volumes:
      # Persist SQLite DB + all generated project repos across rebuilds.
      - ./data:/app/data
      # Global Agent Skills available to every project (settingSources: ['user']).
      - ./global-skills:/home/node/.claude/skills
      # Persist Claude Code conversation transcripts so session resume survives
      # container restarts/redeploys — otherwise the agent loses all context and
      # "forgets" the conversation after every deploy.
      - ./claude-sessions:/home/node/.claude/projects
      # it-ops (opt-in): mount the host's Traefik dynamic-route dir so the broker
      # can publish routes. Inert unless you set TRAEFIK_DYNAMIC_HOST_DIR (the host
      # path) AND TRAEFIK_DYNAMIC_DIR=/traefik-dynamic in .env. Default is a local
      # throwaway so deployments that don't use it mount nothing meaningful.
      - ${TRAEFIK_DYNAMIC_HOST_DIR:-./data/.no-traefik}:/traefik-dynamic

  # Locked-down Docker API gateway for project-environment isolation. Claudable
  # talks to THIS (DOCKER_HOST=tcp://127.0.0.1:2375), never the raw socket, so a
  # Claudable/agent compromise is limited to container ops — not full host root.
  # Only used when PREVIEW_ISOLATION is set; otherwise it just sits idle.
  dockerproxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: claudable-dockerproxy
    restart: unless-stopped
    environment:
      # Allowed: build images + create/run/remove containers + read info.
      - POST=1
      - BUILD=1
      - IMAGES=1
      - CONTAINERS=1
      # NETWORKS: needed for per-project isolation — Claudable creates each
      # project its OWN network (claudable-proj-<slug>) so that project's agent +
      # frontend/backend/db reach each other but NOTHING else. SAFE despite the
      # egress-firewall: those nets are created `--internal` (no gateway → they
      # physically cannot route to the host / private ranges / internet, firewall
      # or not). The egress-capable sandbox net stays subnet-firewalled. The AGENT
      # has NO proxy access (containerized, no docker socket), so only Claudable's
      # trusted control plane calls this. Reads also power the Network overview.
      - NETWORKS=1
      - INFO=1
      - VERSION=1
      - PING=1
      # VOLUMES: needed to manage per-project DB NAMED VOLUMES (persistence for a
      # project's own database container). Low-risk: this API only creates/removes
      # *named* docker volumes — it does NOT grant host bind-mounts (those go
      # through container-create, i.e. POST, which is unchanged). No host-escape
      # surface beyond what POST already allows.
      - VOLUMES=1
      # Denied: everything that could escalate off the box.
      - EXEC=0
      - SWARM=0
      - SYSTEM=0
      - AUTH=0
      - SECRETS=0
      - CONFIGS=0
      - SERVICES=0
      - TASKS=0
      - NODES=0
      - PLUGINS=0
    ports:
      # Loopback only — Claudable (host network) reaches it at 127.0.0.1:2375.
      - "127.0.0.1:2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Custom config: the stock 10m idle timeouts severed every quiet preview's
      # docker-run attach stream, which Claudable's exit handler read as a dead
      # dev server and tore the healthy container down ("Preview is restarting"
      # every 10-20 min). Mounted as the TEMPLATE — the entrypoint regenerates
      # haproxy.cfg from it at start; mounting the final file breaks boot.
      - ./docker/socket-proxy/haproxy.cfg.template:/usr/local/etc/haproxy/haproxy.cfg.template:ro
