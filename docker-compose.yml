# Claudable on box1 (network_mode host). Traefik routes claudable.newstory.tf
# -> http://10.0.1.1:3700. Secrets come from /opt/claudable/.env (never committed).
services:
  claudable:
    build: .
    container_name: claudable
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3700
      - WEB_PORT=3700
      - NEXT_PUBLIC_APP_URL=https://claudable.newstory.tf
      # Per-project preview dev servers (host-bound) — kept clear of the deploy band
      - PREVIEW_PORT_START=3710
      - PREVIEW_PORT_END=3799
      - DATABASE_URL=file:../data/cc.db
      - PROJECTS_DIR=./data/projects
      # Generated sites get ports 3500-3699 in their compose/workflow
      - DEPLOY_PORT_BASE=3500
      - DEPLOY_PORT_SPAN=200
    volumes:
      # Persist SQLite DB + all generated project repos across rebuilds
      - /opt/claudable/data:/app/data
