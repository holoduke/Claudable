# Auto-redeploy Claudable on push to main. First bring-up is manual (creates
# /opt/claudable/.env with secrets); this keeps it updated afterwards.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest   # host-runner: docker + sudo on box1
    steps:
      - name: Build, deploy and route claudable
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          APP=claudable
          PORT=3700
          HOSTNAME_FQDN=claudable.newstory.tf
          DIR=/opt/$APP
          REPO="https://oauth2:${DEPLOY_TOKEN}@git.newstory.tf/newstory-org/$APP.git"

          if [ ! -d "$DIR/.git" ]; then
            echo "First deploy must be set up manually (needs /opt/$APP/.env). Aborting." >&2
            exit 1
          fi
          cd "$DIR"
          git remote set-url origin "$REPO"
          git fetch origin main
          git reset --hard origin/main   # .env is gitignored + lives in $DIR/.env, data is a volume

          docker compose build --no-cache
          docker compose up -d

          ROUTE=/data/coolify/proxy/dynamic/$APP.yml
          sudo tee "$ROUTE" > /dev/null <<YAML
          http:
            routers:
              $APP:
                rule: "Host(\`$HOSTNAME_FQDN\`)"
                entryPoints: [https]
                service: $APP
                tls:
                  certResolver: letsencrypt
              $APP-http:
                rule: "Host(\`$HOSTNAME_FQDN\`)"
                entryPoints: [http]
                middlewares: [redirect-to-https]
                service: $APP
            services:
              $APP:
                loadBalancer:
                  servers:
                    - url: "http://10.0.1.1:$PORT"
            middlewares:
              redirect-to-https:
                redirectScheme:
                  scheme: https
                  permanent: true
          YAML

          sleep 12
          curl -sf "http://localhost:$PORT/" > /dev/null && echo "Claudable up -> https://$HOSTNAME_FQDN"
